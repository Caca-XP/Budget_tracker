name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # deploy automatically on every push to main
  workflow_dispatch:  # also allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase credentials
        # Replaces the placeholders in index.html with the real secrets.
        # Secrets are stored in GitHub → Settings → Secrets, never in the code.
        run: |
          sed -i "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.SUPABASE_URL }}|g" public/index.html
          sed -i "s|SUPABASE_ANON_PLACEHOLDER|${{ secrets.SUPABASE_ANON_KEY }}|g" public/index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: public   # only deploy the public/ folder — no server.js, no csv

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4